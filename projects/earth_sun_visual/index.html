<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地球自转与昼夜变化演示 (Earth Rotation & Day/Night)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: white;
            font-family: sans-serif;
        }

        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 8px;
            pointer-events: auto;
        }

        button {
            background: #444;
            color: white;
            border: 1px solid #666;
            padding: 5px 10px;
            cursor: pointer;
        }

        button:hover {
            background: #666;
        }
    </style>
    <!-- Import Map for Three.js so we can use modules -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div id="info">
        <h1>地球自转与昼夜变化</h1>
        <p>红色标记点：中国北京 (Beijing, China)</p>
        <p>黄色光线代表太阳光，照亮的一面是白天，背光的一面是黑夜</p>
    </div>
    <div id="controls">
        <button id="toggleRot">暂停/继续自转</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Scene Setup
        const scene = new THREE.Scene();
        // Add minimal ambient light so the night side isn't 100% pitch black (moonlight/starlight), but verify user request "被光照到了的部分更亮" implies contrast.
        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 20, 50);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Enable shadows
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 2. The Sun (Source of Light)
        const sunDistance = 30;
        const sunGroup = new THREE.Group();

        // Visual Sun Sphere
        const sunGeometry = new THREE.SphereGeometry(2, 32, 32);
        const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        const sunMesh = new THREE.Mesh(sunGeometry, sunMaterial);
        sunMesh.position.set(-sunDistance, 0, 0); // Sun on the left
        scene.add(sunMesh);

        // Sun Light (Directional or Point)
        const sunLight = new THREE.PointLight(0xffffff, 2000); // High intensity for decay distance
        sunLight.position.set(-sunDistance, 0, 0);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // Sun Rays (Visual lines)
        const rayMaterial = new THREE.LineBasicMaterial({ color: 0xffffaa, transparent: true, opacity: 0.3 });
        const rayCount = 12;
        for (let i = 0; i < rayCount; i++) {
            const points = [];
            points.push(new THREE.Vector3(-sunDistance, 0, 0));
            // Target points near earth, spread out slightly
            const y = (Math.random() - 0.5) * 10;
            const z = (Math.random() - 0.5) * 10;
            points.push(new THREE.Vector3(-5, y, z)); // Stop before hitting earth to avoid clipping
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geometry, rayMaterial);
            scene.add(line);
        }

        // 3. The Earth
        const earthRadius = 5;
        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        // Earth Texture
        const textureLoader = new THREE.TextureLoader();
        // Using a standard earth texture
        const earthTexture = textureLoader.load('https://unpkg.com/three-globe@2.45.0/example/img/earth-blue-marble.jpg');

        const earthGeometry = new THREE.SphereGeometry(earthRadius, 64, 64);
        const earthMaterial = new THREE.MeshStandardMaterial({
            map: earthTexture,
            roughness: 0.8,
            metalness: 0.1,
        });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        earth.castShadow = true;
        earth.receiveShadow = true;
        // Adjust texture alignment if necessary. 
        // Standard textures usually have Greenwich at standard UV, requiring -90 deg rotation for Y-up world?
        // We will adjust visually or via calculation.
        earthGroup.add(earth);

        // 4. Beijing Marker
        // Coordinates: 39.9N, 116.4E
        const beijingLat = 39.9042;
        const beijingLon = 116.4074;

        function getVectorFromLatLon(lat, lon, radius) {
            // Convert latitude and longitude to radians
            const latRad = lat * Math.PI / 180;
            const lonRad = lon * Math.PI / 180;

            // For standard equirectangular earth textures with Three.js SphereGeometry:
            // We need to rotate longitude by +90 degrees to align properly
            const adjustedLonRad = lonRad + Math.PI / 2;

            // Calculate Cartesian coordinates (Y-up coordinate system)
            const x = radius * Math.cos(latRad) * Math.cos(adjustedLonRad);
            const y = radius * Math.sin(latRad);
            const z = radius * Math.cos(latRad) * Math.sin(adjustedLonRad);

            return new THREE.Vector3(x, y, z);
        }

        const markerPos = getVectorFromLatLon(beijingLat, beijingLon, earthRadius);

        // Marker Mesh (Red Pin)
        const markerGeometry = new THREE.ConeGeometry(0.1, 0.4, 16);
        markerGeometry.translate(0, 0.2, 0); // Pivot at base
        markerGeometry.rotateX(Math.PI / 2); // Point out
        const markerMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const marker = new THREE.Mesh(markerGeometry, markerMaterial);

        // Align marker to surface normal
        marker.lookAt(markerPos);
        marker.position.copy(markerPos);

        // Because of texture mapping alignment issues (0 longitude usually doesn't align with Z+ by default in all textures), 
        // we might typically need to rotate the earth mesh 180 degrees or 90 degrees around Y.
        // The texture `earth-blue-marble` typically has 0 deg longitude at the center.
        // Three.js SphereGeometry UV starts (0,0) [left bottom] -> map to vertices.
        // It maps 2PI wrap.
        // The seam is at +X or -Z?
        // Let's manually rotate the generic Geometries to align 0,0 to Z+.
        // Usually, `earth.rotation.y = -Math.PI / 2` aligns Greenwich to Z+ for standard maps.
        // Let's try applying this correction to the Earth Mesh, and keep marker purely mathematical.
        // Wait, if I rotate the Earth Mesh, the texture moves. I must move the marker WITH it.
        // So I will add the marker to the *Earth Mesh* as a child.
        earth.add(marker);

        // Now, if 0,0 is at Z+ for math, does the texture 0,0 align there?
        // Standard Equirectangular: Center (0,0) is Greenwich.
        // SphereGeometry: Default orientation puts the seam (u=0/1) at +Z? No, -Z usually.
        // If center of texture (u=0.5) is the front, that's +Z.
        // So if Geometry wrap is default, U=0.5 is at +X (rotated)?
        // I will assume a correction: rotation.y = -Math.PI/2 is common.
        // Let's try without correction first, but since I can't see it, I'll rely on the marker text.
        // I'll stick the marker on the earth.

        // Add Label "China, Beijing"
        // Using a sprite for text
        function createLabel(text) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 64;
            context.font = '24px Arial';
            context.fillStyle = 'white';
            context.fillText(text, 10, 40);
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(4, 1, 1);
            return sprite;
        }
        const label = createLabel("北京 Beijing");
        label.position.set(0, 0.5, 0); // Above marker
        marker.add(label);

        // Axis helper? No, just visual.

        // Starfield Background
        const starsGeometry = new THREE.BufferGeometry();
        const startCount = 1000;
        const starPos = new Float32Array(startCount * 3);
        for (let i = 0; i < startCount * 3; i++) {
            starPos[i] = (Math.random() - 0.5) * 600;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starField);


        // Animation Loop
        let isRotating = true;

        document.getElementById('toggleRot').addEventListener('click', () => {
            isRotating = !isRotating;
        });

        function animate() {
            requestAnimationFrame(animate);

            if (isRotating) {
                // Earth rotates on its axis (Y axis in this setup)
                // Real earth tilts, but user request didn't specify tilt logic (just "自转").
                // A slight tilt makes it look realistic.
                // But rotating around Y is the request "自转". 
                // To support tilt, we'd rotate around a tilted axis.
                // Simplest: Rotate the Earth Group?
                // Let's just rotate the earth mesh locally around Y.
                earth.rotation.y += 0.005;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize tilt
        earth.rotation.z = 23.5 * Math.PI / 180; // Earth's axial tilt

        animate();
    </script>
</body>

</html>
